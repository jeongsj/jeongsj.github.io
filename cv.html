<head>

    <title>CV | Seong-Jo Jeong</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Output-type taxonomy — the site's signature color system */
            --accent-paper: #0f6e56;
            --accent-paper-bg: #e1f5ee;
            --accent-report: #854f0b;
            --accent-report-bg: #faeeda;
            --accent-essay: #993c1d;
            --accent-essay-bg: #faece7;
            --accent-talk: #3c3489;
            --accent-talk-bg: #eeedfe;

            --accent: #0f6e56;
            --accent-soft: #e4f2ec;
            --accent-line: rgba(15, 110, 86, 0.35);

            /* Ink scale — all text colors pass WCAG AA on the paper background */
            --text-primary: #161513;
            --text-body: #2a2926;
            --text-secondary: #52504a;
            --text-muted: #6b6960;
            --text-kr: #5c5a54;

            --bg: #fbfaf7;
            --bg-hover: #f3f1ea;
            --border: #e6e3d8;
            --border-soft: #edeae1;
            --nav-bg: rgba(251, 250, 247, 0.88);

            --font-sans: 'Inter', 'Noto Sans KR', 'Helvetica Neue', system-ui, -apple-system, sans-serif;

            --content-max: 880px;
            --sidebar-w: 140px;
            --gutter: 40px;
        }

        * { box-sizing: border-box; }

        html, body { margin: 0; padding: 0; }

        body {
            font-family: var(--font-sans);
            color: var(--text-primary);
            background: var(--bg);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        a { color: inherit; }

        ::selection {
            background: var(--accent-soft);
            color: var(--text-primary);
        }

        :focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 3px;
            border-radius: 2px;
        }

        .skip-link {
            position: absolute;
            left: -9999px;
            top: 0;
            background: var(--accent);
            color: #fff;
            padding: 8px 14px;
            font-size: 13px;
            z-index: 200;
            border-radius: 0 0 4px 0;
            text-decoration: none;
        }

        .skip-link:focus { left: 0; }

        /* ========== NAV ========== */
        nav.site-nav {
            border-bottom: 1px solid var(--border-soft);
            background: var(--nav-bg);
            backdrop-filter: blur(10px) saturate(1.2);
            -webkit-backdrop-filter: blur(10px) saturate(1.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        /* Signature: the taxonomy spectrum — paper / report / essay / talk */
        nav.site-nav::before {
            content: '';
            display: block;
            height: 3px;
            background: linear-gradient(90deg,
                var(--accent-paper)  0 25%,
                var(--accent-report) 25% 50%,
                var(--accent-essay)  50% 75%,
                var(--accent-talk)   75% 100%);
        }

        .nav-container {
            max-width: var(--content-max);
            margin: 0 auto;
            padding: 14px 44px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-weight: 600;
            color: var(--text-primary);
            text-decoration: none;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 24px;
            margin: 0;
            padding: 0;
        }

        .nav-links a {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 500;
            text-decoration: none;
            transition: color 0.2s;
        }

        .nav-links a:hover,
        .nav-links a.active,
        .nav-links a[aria-current="page"] {
            color: var(--text-primary);
            text-decoration: underline;
            text-decoration-color: var(--accent);
            text-decoration-thickness: 1.5px;
            text-underline-offset: 5px;
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 1.4rem;
            color: var(--text-primary);
            cursor: pointer;
            padding: 2px 4px;
            line-height: 1;
        }

        /* ========== CONTAINER ========== */
        main {
            max-width: var(--content-max);
            margin: 0 auto;
            padding: 52px 44px 72px 44px;
        }

        /* ========== SECTION GRID ========== */
        .section {
            display: grid;
            grid-template-columns: var(--sidebar-w) 1fr;
            gap: var(--gutter);
        }

        .section-label {
            font-size: 11px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--text-secondary);
            font-weight: 500;
            margin: 0 0 8px 0;
        }

        /* ========== HERO ========== */
        .page-title {
            font-size: 27px;
            font-weight: 600;
            line-height: 1.2;
            letter-spacing: -0.018em;
            margin: 0 0 28px 0;
            color: var(--text-primary);
        }

        /* ========== DOWNLOAD CARDS ========== */
        .cv-downloads {
            display: flex;
            gap: 14px;
            margin-bottom: 36px;
            flex-wrap: wrap;
        }

        .cv-download {
            flex: 1;
            min-width: 220px;
            padding: 18px 22px;
            border: 1px solid var(--border);
            border-radius: 8px;
            text-decoration: none;
            color: inherit;
            background: transparent;
            transition: border-color 0.15s ease, background 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
        }

        .cv-download:hover {
            border-color: var(--accent);
            background: var(--accent-soft);
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(15, 110, 86, 0.06);
        }

        .cv-download-lang {
            font-size: 10.5px;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 6px;
        }

        .cv-download-label {
            font-size: 15.5px;
            font-weight: 500;
            color: var(--text-primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .cv-download-label .arrow {
            color: var(--text-muted);
            font-size: 16px;
            transition: color 0.15s, transform 0.15s;
        }

        .cv-download:hover .arrow {
            color: var(--accent);
            transform: translateY(2px);
        }

        /* ========== TOGGLE + VIEWER ========== */
        .cv-viewer-wrap {
            margin-top: 12px;
        }

        .cv-viewer-label {
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 12px;
        }

        .cv-toggle {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
        }

        .cv-toggle-btn {
            font-size: 12px;
            font-weight: 500;
            padding: 6px 16px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-family: inherit;
            border-radius: 4px;
            transition: border-color 0.15s, color 0.15s, background 0.15s;
            letter-spacing: 0.02em;
        }

        .cv-toggle-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-soft);
        }

        .cv-toggle-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        .cv-viewer {
            width: 100%;
            height: 900px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg-hover);
            display: block;
        }

        .cv-viewer-note {
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.6;
            margin-top: 10px;
        }

        /* ========== FOOTER ========== */
        footer {
            max-width: var(--content-max);
            margin: 0 auto;
            padding: 32px 44px 48px 44px;
            border-top: 1px solid var(--border);
            font-size: 11.5px;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        footer a { color: var(--text-muted); text-decoration: none; }
        footer a:hover { color: var(--accent); }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                transition-duration: 0.01ms !important;
                animation-duration: 0.01ms !important;
            }
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 768px) {
            .nav-container { padding: 12px 20px; position: relative; }
            .menu-toggle { display: block; }

            .nav-links {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                background: var(--bg);
                border-bottom: 1px solid var(--border-soft);
                box-shadow: 0 4px 10px rgba(0,0,0,0.04);
                padding: 8px 0;
                gap: 0;
                z-index: 99;
            }

            .nav-links.active { display: flex; }
            .nav-links li { width: 100%; text-align: center; }

            .nav-links a {
                display: block;
                padding: 12px 0;
                font-size: 13px;
            }

            .nav-links a:hover,
            .nav-links a.active,
            .nav-links a[aria-current="page"] {
                background: var(--bg-hover);
                text-decoration: none;
            }

            main { padding: 32px 22px 56px 22px; }
            .section { grid-template-columns: 1fr; gap: 18px; }

            .page-title { font-size: 23px; }

            .cv-download { flex: 1 1 100%; }

            .cv-viewer { height: 600px; }

            footer { padding: 24px 22px 36px 22px; }
        }
    </style>
</head>
<body>

    <a href="#main" class="skip-link">Skip to content</a>

    <nav class="site-nav" aria-label="Primary">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">Seong-Jo Jeong</a>

            <button class="menu-toggle" onclick="toggleMenu()" aria-label="Toggle menu" aria-expanded="false" aria-controls="navLinks">☰</button>

            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">About</a></li>
                <li><a href="research.html">Research</a></li>
                <li><a href="publications.html">Publications</a></li>
                <li><a href="news.html">News</a></li>
                <li><a href="cv.html" aria-current="page">CV</a></li>
            </ul>
        </div>
    </nav>

    <main id="main">

        <section class="section">
            <div>
                <div class="section-label" aria-hidden="true">CV</div>
            </div>
            <div>
                <h1 class="page-title">Curriculum Vitae</h1>

                <!-- ========== DOWNLOAD CARDS ========== -->
                <div class="cv-downloads">
                    <a href="cv_eng.pdf" download class="cv-download">
                        <div class="cv-download-lang">English</div>
                        <div class="cv-download-label">
                            <span>Download CV (PDF)</span>
                            <span class="arrow" aria-hidden="true">↓</span>
                        </div>
                    </a>
                    <a href="cv_kr.pdf" download class="cv-download">
                        <div class="cv-download-lang" lang="ko">한국어</div>
                        <div class="cv-download-label" lang="ko">
                            <span>CV 다운로드 (PDF)</span>
                            <span class="arrow" aria-hidden="true">↓</span>
                        </div>
                    </a>
                </div>

                <!-- ========== TOGGLE + EMBEDDED VIEWER ========== -->
                <div class="cv-viewer-wrap">
                    <div class="cv-viewer-label">Preview · <span lang="ko">미리보기</span></div>
                    <div class="cv-toggle" role="group" aria-label="Preview language">
                        <button type="button" class="cv-toggle-btn active" data-lang="eng" aria-pressed="true">English</button>
                        <button type="button" class="cv-toggle-btn" data-lang="kr" aria-pressed="false" lang="ko">한국어</button>
                    </div>
                    <iframe id="cvViewer"
                            class="cv-viewer"
                            src="cv_eng.pdf"
                            title="Seong-Jo Jeong CV (English)"
                            loading="lazy"></iframe>
                </div>
            </div>
        </section>

    </main>

    <footer>
        <div>© Seong-Jo Jeong · Last updated July 2026</div>
        <div><a href="mailto:demonicsj@gmail.com">demonicsj@gmail.com</a></div>
    </footer>

    <script>
        function toggleMenu() {
            var nav = document.getElementById("navLinks");
            var btn = document.querySelector(".menu-toggle");
            var open = nav.classList.toggle("active");
            btn.setAttribute("aria-expanded", open ? "true" : "false");
        }

        // CV language toggle
        (function () {
            var viewer = document.getElementById('cvViewer');
            var buttons = document.querySelectorAll('.cv-toggle-btn');
            var sources = {
                eng: { src: 'cv_eng.pdf', title: 'Seong-Jo Jeong CV (English)' },
                kr:  { src: 'cv_kr.pdf',  title: 'Seong-Jo Jeong CV (Korean)' }
            };

            buttons.forEach(function (btn) {
                btn.addEventListener('click', function () {
                    var lang = this.dataset.lang;
                    buttons.forEach(function (b) {
                        b.classList.remove('active');
                        b.setAttribute('aria-pressed', 'false');
                    });
                    this.classList.add('active');
                    this.setAttribute('aria-pressed', 'true');
                    viewer.src = sources[lang].src;
                    viewer.title = sources[lang].title;
                });
            });
        })();
    </script>

</body>
</html>
