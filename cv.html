<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Curriculum Vitae of Seong-Jo Jeong (정성조). Ph.D. Candidate in Sociology at Chung-Ang University. Download English or Korean version.">
    <meta name="keywords" content="Seong-Jo Jeong, 정성조, CV, Curriculum Vitae, Sociology, Chung-Ang University">
    <meta name="author" content="Seong-Jo Jeong">

    <meta property="og:title" content="CV — Seong-Jo Jeong">
    <meta property="og:description" content="Curriculum Vitae of Seong-Jo Jeong, Ph.D. Candidate in Sociology.">
    <meta property="og:url" content="https://jeongsj.github.io/cv.html">
    <meta property="og:type" content="website">

    <link rel="canonical" href="https://jeongsj.github.io/cv.html">
    <title>CV | Seong-Jo Jeong</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --text-primary: #0f0f0f;
            --text-body: #222;
            --text-secondary: #555;
            --text-muted: #888;
            --text-subtle: #aaa;
            --text-faint: #bbb;

            --border: #e8e8e5;
            --border-soft: #ececec;
            --nav-bg: #fcfcfc;

            --font-sans: 'Inter', 'Noto Sans KR', 'Helvetica Neue', system-ui, -apple-system, sans-serif;

            --content-max: 880px;
            --sidebar-w: 140px;
            --gutter: 40px;
        }

        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; }

        body {
            font-family: var(--font-sans);
            color: var(--text-primary);
            background: #ffffff;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        a { color: inherit; }

        /* ========== NAV ========== */
        nav {
            border-bottom: 1px solid var(--border-soft);
            background: var(--nav-bg);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-container {
            max-width: var(--content-max);
            margin: 0 auto;
            padding: 14px 44px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .nav-logo {
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-weight: 600;
            color: #111;
            text-decoration: none;
        }
        .nav-links {
            list-style: none;
            display: flex;
            gap: 22px;
            margin: 0;
            padding: 0;
        }
        .nav-links a {
            font-size: 12px;
            color: #444;
            font-weight: 500;
            text-decoration: none;
            transition: color 0.2s;
        }
        .nav-links a:hover,
        .nav-links a.active {
            color: #000;
            border-bottom: 1px solid #000;
            padding-bottom: 1px;
        }
        .menu-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 1.4rem;
            color: #111;
            cursor: pointer;
            padding: 0;
            line-height: 1;
        }

        /* ========== CONTAINER ========== */
        main {
            max-width: var(--content-max);
            margin: 0 auto;
            padding: 52px 44px 72px 44px;
        }

        /* ========== SECTION GRID ========== */
        .section {
            display: grid;
            grid-template-columns: var(--sidebar-w) 1fr;
            gap: var(--gutter);
        }
        .section-label {
            font-size: 11px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--text-secondary);
            font-weight: 500;
            margin-bottom: 8px;
        }

        /* ========== HERO ========== */
        .page-title {
            font-size: 28px;
            font-weight: 400;
            line-height: 1.2;
            letter-spacing: -0.01em;
            margin: 0 0 8px 0;
            color: var(--text-primary);
        }
        .page-subtitle {
            font-size: 13px;
            color: var(--text-muted);
            margin: 0 0 28px 0;
        }

        /* ========== DOWNLOAD CARDS ========== */
        .cv-downloads {
            display: flex;
            gap: 14px;
            margin-bottom: 36px;
            flex-wrap: wrap;
        }

        .cv-download {
            flex: 1;
            min-width: 220px;
            padding: 18px 22px;
            border: 1px solid var(--border);
            border-radius: 3px;
            text-decoration: none;
            color: inherit;
            background: #fff;
            transition: all 0.15s ease;
        }

        .cv-download:hover {
            border-color: #333;
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .cv-download-lang {
            font-size: 10.5px;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 500;
            margin-bottom: 6px;
        }

        .cv-download-label {
            font-size: 16px;
            font-weight: 500;
            color: #111;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .cv-download-label .arrow {
            color: var(--text-muted);
            font-size: 16px;
            transition: color 0.15s, transform 0.15s;
        }

        .cv-download:hover .arrow {
            color: #111;
            transform: translateY(2px);
        }

        /* ========== TOGGLE + VIEWER ========== */
        .cv-viewer-wrap {
            margin-top: 12px;
        }

        .cv-toggle {
            display: flex;
            gap: 6px;
            margin-bottom: 14px;
        }

        .cv-toggle-btn {
            font-size: 12px;
            padding: 6px 16px;
            border: 1px solid var(--border);
            background: #fff;
            color: var(--text-secondary);
            cursor: pointer;
            font-family: inherit;
            border-radius: 3px;
            transition: all 0.15s;
            letter-spacing: 0.02em;
        }

        .cv-toggle-btn:hover {
            border-color: #888;
            color: #111;
        }

        .cv-toggle-btn.active {
            background: #111;
            border-color: #111;
            color: #fff;
        }

        .cv-viewer-label {
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 500;
            margin-bottom: 12px;
        }

        .cv-viewer {
            width: 100%;
            height: 900px;
            border: 1px solid var(--border);
            background: #f7f7f5;
            display: block;
        }

        .cv-viewer-fallback {
            padding: 40px 20px;
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
        }

        /* ========== FOOTER ========== */
        footer {
            max-width: var(--content-max);
            margin: 0 auto;
            padding: 32px 44px 48px 44px;
            border-top: 1px solid var(--border);
            font-size: 11px;
            color: #999;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        footer a { color: #999; text-decoration: none; }
        footer a:hover { color: #333; }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 768px) {
            .nav-container { padding: 12px 20px; position: relative; }
            .menu-toggle { display: block; }
            .nav-links {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                background: white;
                border-bottom: 1px solid var(--border-soft);
                box-shadow: 0 4px 10px rgba(0,0,0,0.04);
                padding: 8px 0;
                gap: 0;
                z-index: 99;
            }
            .nav-links.active { display: flex; }
            .nav-links li { width: 100%; text-align: center; }
            .nav-links a {
                display: block;
                padding: 12px 0;
                font-size: 13px;
            }
            .nav-links a:hover,
            .nav-links a.active {
                background: #f7f7f7;
                border-bottom: none;
            }

            main { padding: 32px 22px 56px 22px; }
            .section { grid-template-columns: 1fr; gap: 18px; }

            .page-title { font-size: 24px; }

            .cv-download { flex: 1 1 100%; }

            .cv-viewer {
                height: 600px;
            }

            footer { padding: 24px 22px 36px 22px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-container">
            <a href="index.html" class="nav-logo">Seong-Jo Jeong</a>
            <button class="menu-toggle" onclick="toggleMenu()" aria-label="Toggle menu">☰</button>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">About</a></li>
                <li><a href="research.html">Research</a></li>
                <li><a href="publications.html">Publications</a></li>
                <li><a href="news.html">News</a></li>
                <li><a href="cv.html" class="active">CV</a></li>
            </ul>
        </div>
    </nav>

    <main>

        <section class="section">
            <div>
                <div class="section-label">CV</div>
            </div>
            <div>
                <h1 class="page-title">Curriculum Vitae</h1>


                <!-- ========== DOWNLOAD CARDS ========== -->
                <div class="cv-downloads">
                    <a href="cv_eng.pdf" download class="cv-download">
                        <div class="cv-download-lang">English</div>
                        <div class="cv-download-label">
                            <span>Download CV (PDF)</span>
                            <span class="arrow">↓</span>
                        </div>
                    </a>
                    <a href="cv_kr.pdf" download class="cv-download">
                        <div class="cv-download-lang">한국어</div>
                        <div class="cv-download-label">
                            <span>CV 다운로드 (PDF)</span>
                            <span class="arrow">↓</span>
                        </div>
                    </a>
                </div>

                <!-- ========== TOGGLE + EMBEDDED VIEWER ========== -->
                <div class="cv-viewer-wrap">
                    <div class="cv-viewer-label">Preview · 미리보기</div>
                    <div class="cv-toggle" role="tablist">
                        <button type="button" class="cv-toggle-btn active" data-lang="eng" id="toggleEng" aria-pressed="true">English</button>
                        <button type="button" class="cv-toggle-btn" data-lang="kr" id="toggleKr" aria-pressed="false">한국어</button>
                    </div>
                    <iframe id="cvViewer"
                            class="cv-viewer"
                            src="cv_eng.pdf"
                            title="Seong-Jo Jeong CV"
                            loading="lazy">
                        <p class="cv-viewer-fallback">
                            Your browser does not support embedded PDFs.
                            Please use the download button above.
                        </p>
                    </iframe>
                </div>
            </div>
        </section>

    </main>

    <footer>
        <div>© Seong-Jo Jeong · Last updated April 2026</div>
        <div><a href="mailto:demonicsj@gmail.com">demonicsj@gmail.com</a></div>
    </footer>

    <script>
        function toggleMenu() {
            document.getElementById("navLinks").classList.toggle("active");
        }

        // CV language toggle
        (function() {
            const viewer = document.getElementById('cvViewer');
            const buttons = document.querySelectorAll('.cv-toggle-btn');
            const sources = {
                eng: 'cv_eng.pdf',
                kr: 'cv_kr.pdf'
            };

            buttons.forEach(btn => {
                btn.addEventListener('click', function() {
                    const lang = this.dataset.lang;
                    // Update active state
                    buttons.forEach(b => {
                        b.classList.remove('active');
                        b.setAttribute('aria-pressed', 'false');
                    });
                    this.classList.add('active');
                    this.setAttribute('aria-pressed', 'true');
                    // Swap PDF source
                    viewer.src = sources[lang];
                });
            });
        })();
    </script>

</body>
</html>
